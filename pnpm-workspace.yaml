packages:
  - 'apps/*'
  - 'packages/*'

# 统一依赖版本：catalog 作为单一真相源，所有包通过 "catalog:" 引用，
# 避免 Monorepo 内多版本漂移。升级依赖只需改这一处。
catalog:
  # --- Vue 核心 ---
  vue: ^3.5.13
  vue-tsc: ^3.3.5
  '@vue/tsconfig': ^0.9.1

  # --- 构建工具：Vite 8（内置 rolldown 打包，无需额外安装 rolldown-vite 过渡包）---
  vite: ^8.0.16
  '@vitejs/plugin-vue': ^6.0.7

  # --- 构建工具：Rsbuild（版本对齐参考项目，adapter 第二阶段实现）---
  '@rsbuild/core': ^2.0.15
  '@rsbuild/plugin-vue': ^1.2.9
  # 生产构建优化插件：图片压缩 + JS/CSS gzip 预压缩
  '@rsbuild/plugin-image-compress': ^1.3.4
  compression-webpack-plugin: ^11.1.0

  # --- TypeScript 6（baseUrl 已弃用，paths 直接相对 tsconfig 目录解析，无需 baseUrl）---
  typescript: ^6.0.3
  '@types/node': ^22.10.2

  # --- 任务编排 ---
  turbo: ^2.3.3

  # --- 脚手架：子包 / 子页面代码生成（pnpm new:app / new:page）---
  plop: ^4.0.5

  # --- 代码规范 ---
  eslint: ^9.17.0
  '@eslint/js': ^9.17.0
  typescript-eslint: ^8.18.1
  eslint-plugin-vue: ^9.32.0
  vue-eslint-parser: ^9.4.3
  '@vue/eslint-config-prettier': ^10.1.0
  prettier: ^3.4.2
  globals: ^15.13.0

  # --- Git 提交工作流：提交前 lint + 提交信息规范校验 ---
  husky: ^9.1.7
  lint-staged: ^17.0.7
  '@commitlint/cli': ^21.0.2
  '@commitlint/config-conventional': ^21.0.2
